<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mommy's FoodHub Cashier</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../CSS/style.css">
</head>

<body>
<div class="container-fluid p-3">

    <h2 class="text-center mb-4">Mommy's FoodHub Cashier</h2>

    <div class="row">

        <!-- PRODUCTS -->
        <div class="col-md-8">
            <div class="row g-3" id="productsContainer">
                <!-- Products loaded from Supabase -->
            </div>
        </div>

        <!-- CART -->
        <div class="col-md-4 mt-4 mt-md-0">
            <div class="card">
                <div class="card-header bg-dark text-white">
                    Cart
                </div>

                <div class="card-body cart-box">
                    <ul class="list-group mb-3" id="cartList"></ul>
                    <h5>Total: ₱<span id="total">0</span></h5>

                    <button class="btn btn-success w-100 mt-2" onclick="checkout()">
                        Checkout
                    </button>
                    <button class="btn btn-outline-danger w-100 mt-2" onclick="clearCart()">
                        Clear
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Supabase JS -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const supabaseUrl = 'https://ooomoeutmbmomeiqycag.supabase.co';
  const supabaseKey = 'sb_publishable_WQXml2_T7YtYQo_QFw07UA_HRgqMMjH';
  const supabase = createClient(supabaseUrl, supabaseKey);

  window.supabase = supabase; // make globally available

</script>

<script src="../JS/script.js" type="module"></script>
</body>
</html>
